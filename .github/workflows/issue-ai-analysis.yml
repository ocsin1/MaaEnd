name: Issue AI Analysis

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to analyze'
        required: true
        type: number

jobs:
  request-analysis:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      CURSOR_API_KEY: ${{ secrets.CURSOR_KEY }}
    steps:
      - name: Determine issue number
        id: number
        run: |
          if [[ "${{ github.event_name }}" == "issues" ]]; then
            echo "ISSUE_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ISSUE_NUMBER=${{ github.event.inputs.issue_number }}" >> $GITHUB_ENV
          else
            echo "Unknown trigger" && exit 1
          fi

      - name: Request AI Analysis
        shell: bash
        run: |
          curl --request POST \
            --fail-with-body \
            --url https://api.cursor.com/v0/agents \
            -u ${{ secrets.CURSOR_KEY }}: \
            --header 'Content-Type: application/json' \
            --data '{
            "prompt": {
              "text": "你是一个专业的GitHub issue自动回复助手，名为“MaaEndBot”。当前的issue是（#${{ env.ISSUE_NUMBER }}）。你的唯一任务是在issue中发表评论，提供分析和建议。你不会对issue进行任何修改（如关闭、重新打开、打标签、编辑标题等），也不会创建任何Pull Request。你的所有交互仅限于通过评论与用户和开发者沟通。你的回复旨在帮助用户和开发者更快地定位问题。请遵循以下步骤：1. 理解问题：仔细阅读issue的标题和描述，提取关键信息，包括错误消息、环境、复现步骤、预期行为和实际行为。2. 收集附加信息：如果issue中包含附件（如日志文件、截图等），尝试下载并分析这些文件中的内容。如果是截图，可以描述你看到的内容；如果是文本，可以提取关键错误行。3. 代码分析：基于问题描述，尝试确定可能相关的代码文件。你可以搜索仓库中的代码，阅读相关部分的实现，分析可能导致问题的原因。如果你能定位到具体的代码行，可以指出潜在的错误。4. 提出解决方案：如果你找到了问题的原因，提供详细的解释和解决方案。这可能包括代码修改建议、配置更改、依赖更新等。5. 请求更多信息：如果信息不足无法确定问题，礼貌地请求用户提供更多细节，例如完整的日志、环境信息、复现步骤等。6. 寻求帮助：如果你尽了最大努力仍然无法解决问题，并且问题涉及到特定的代码区域，使用`git blame`找出最近修改这些代码的开发者。在回复中@他们，简要说明问题并请求他们协助。7. 回复格式：使用Markdown格式，使回复易于阅读。对于代码块，使用```。对于@提及，使用@username。8. 注意事项：不要做出无根据的猜测；保持专业和友善；不要泄露任何敏感信息；如果问题涉及安全漏洞，请遵循安全策略私下报告。"
            },
            "model": "composer-1.5",
            "source": {
              "repository": "https://github.com/MaaEnd/MaaEnd"
            }
          }'
