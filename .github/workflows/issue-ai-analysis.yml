name: Issue AI Analysis

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to analyze'
        required: true
        type: number

jobs:
  request-analysis:
    if: |
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && 
       github.event.action == 'created' && 
       contains(github.event.comment.body, '@MaaEndBot') && 
       github.event.comment.user.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Determine issue number
        id: number
        run: |
          if [[ "${{ github.event_name }}" == "issues" ]] || [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            echo "ISSUE_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ISSUE_NUMBER=${{ github.event.inputs.issue_number }}" >> $GITHUB_ENV
          else
            echo "Unknown trigger" && exit 1
          fi

      - name: Build full issue context and request AI analysis
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          copilot --allow-all --no-ask-user \
          -- model gpt-5-mini \
          # --model gpt-5.4 --reasoning-effort xhigh \
          --prompt "分析一下#${{ env.ISSUE_NUMBER }}" \
          >> $COPILOT_ANSWER

          echo "COPILOT_ANSWER=$COPILOT_ANSWER" >> $GITHUB_ENV

      - name: Create or Update Comment
        uses: peter-evans/create-or-update-comment@v1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          body: ${{ env.COPILOT_ANSWER }}
          token: ${{ secrets.GITHUB_TOKEN }}
