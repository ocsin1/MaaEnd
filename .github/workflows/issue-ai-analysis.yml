name: AI Issue Analysis

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to analyze'
        required: true
        type: number

jobs:
  codex-analysis:
    if: |
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.action == 'created' &&
       contains(github.event.comment.body, '@MaaEndBot') &&
       github.event.comment.user.type != 'Bot')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    steps:
      - name: Install DMP analysis tools
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y minidump-stackwalk dump_syms

      # 分析质量仍依赖：.claude/skills/maaend-issue-log-analysis/SKILL.md
      - name: Analyze issue with Codex
        id: codex
        continue-on-error: true
        uses: MistEO/ai-issue-analysis@codex
        with:
          github-token: ${{ secrets.MAAEND_BOT_TOKEN }}
          codex-api-key: ${{ secrets.CODEX_API_KEY }}
          codex-base-url: ${{ secrets.CODEX_BASE_URL }}
          codex-model: ${{ secrets.CODEX_MODEL }}
          bot-name: '@MaaEndBot'
          initial-comment-body: |
            🤖 **MaaEndBot 正在分析该 Issue...**

            感谢您的反馈！AI 正在自动分析该问题，预计耗时约 10 分钟。
          prompt-template: |
            分析 GitHub Issue {{issue_number}}。把最终结论写到 {{answer_file}}。

      - name: 查看完整输入输出
        if: always()
        env:
          ANALYSIS_PROMPT: ${{ steps.codex.outputs.analysis-prompt }}
          ISSUE_NUMBER: ${{ steps.codex.outputs.issue-number }}
          COMMENT_ID: ${{ steps.codex.outputs.comment-id }}
          COMMENT_URL: ${{ steps.codex.outputs.comment-url }}
          CODEX_OUTPUT: ${{ steps.codex.outputs.codex-output }}
          FINAL_CONCLUSION: ${{ steps.codex.outputs.final-conclusion }}
        run: |
          printf '%s\n' "$ANALYSIS_PROMPT"
          echo "issue_number=$ISSUE_NUMBER"
          echo "comment_id=$COMMENT_ID"
          echo "comment_url=$COMMENT_URL"
          printf '%s\n' "$CODEX_OUTPUT"
          printf '%s\n' "$FINAL_CONCLUSION"
