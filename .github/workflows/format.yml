name: format

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16,22 * * *" # UTC+8 0:00, 06:00

jobs:
  format:
    if: ${{ github.repository_owner == 'MaaEnd' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MAAEND_BOT_TOKEN }}
          show-progress: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache-dependency-path: agent/go-service/go.sum

      - name: Install dependencies
        run: pnpm install

      - name: Run format
        run: pnpm format:all

      - name: Commit and push changes
        uses: actions-js/push@master
        with:
          rebase: true
          branch: ${{ github.ref }}
          message: "style: auto format code

            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            [skip changelog]"
          github_token: ${{ secrets.MAAEND_BOT_TOKEN }}
